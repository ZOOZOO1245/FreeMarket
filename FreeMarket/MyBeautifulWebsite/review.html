<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 작성</title>
    <style>
        .review-item {
            border: 1px solid #ccc;
            margin: 10px 0;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>리뷰 작성하기</h1>
    <form id="reviewForm">
        <label for="name">이름:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="review">후기:</label><br>
        <textarea id="review" name="review" rows="4" cols="50" required></textarea><br><br>

        <input type="submit" value="제출">
    </form>
    <h2>작성 후기</h2>
    <div id="reviewsContainer"></div>
    <a href="index.html">돌아가기</a> <!-- 홈으로 돌아가는 링크 -->

    <script>
        // 페이지가 로드될 때 저장된 후기를 불러오는 함수
        function loadReviews() {
            const reviewsContainer = document.getElementById('reviewsContainer');
            reviewsContainer.innerHTML = ''; // 기존 후기를 지움

            const reviews = JSON.parse(localStorage.getItem('reviews')) || [];
            reviews.forEach(review => {
                const reviewItem = document.createElement('div');
                reviewItem.className = 'review-item';
                reviewItem.innerHTML = `<strong>${review.name}</strong><p>${review.review}</p>`;
                reviewsContainer.appendChild(reviewItem);
            });
        }

        // 후기를 저장하는 함수
        document.getElementById('reviewForm').addEventListener('submit', function(event) {
            event.preventDefault(); // 기본 제출 동작 방지

            const name = document.getElementById('name').value;
            const review = document.getElementById('review').value;

            const reviews = JSON.parse(localStorage.getItem('reviews')) || [];
            reviews.push({ name, review });
            localStorage.setItem('reviews', JSON.stringify(reviews));

            // 폼 초기화
            document.getElementById('reviewForm').reset();
            loadReviews(); // 후기를 다시 불러옴
        });

        // 페이지 로드 시 후기를 불러옴
        window.onload = loadReviews;
    </script>
</body>
</html>
